events {
    worker_connections 1024;
}

http {
    upstream grpc_proxies {
        server grpc-proxy-1:9090;
        server grpc-proxy-2:9090;
        server grpc-proxy-3:9090;
    }

    server {
        listen 9090 http2;

        location / {
            grpc_pass grpc://grpc_proxies;
            proxy_next_upstream error timeout;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}
