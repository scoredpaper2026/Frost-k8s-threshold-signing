services:
  vault:
    image: hashicorp/vault:latest
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=frost-dev-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/data
    networks:
      - minikube
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10

  signer-1:
    build:
      context: ../
      dockerfile: deploy/docker/Dockerfile.signer
    environment:
      - SIGNER_ID=1
      - PORT=8081
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=frost-dev-token
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - minikube

  signer-2:
    build:
      context: ../
      dockerfile: deploy/docker/Dockerfile.signer
    environment:
      - SIGNER_ID=2
      - PORT=8082
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=frost-dev-token
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - minikube

  signer-3:
    build:
      context: ../
      dockerfile: deploy/docker/Dockerfile.signer
    environment:
      - SIGNER_ID=3
      - PORT=8083
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=frost-dev-token
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - minikube

  signer-4:
    build:
      context: ../
      dockerfile: deploy/docker/Dockerfile.signer
    environment:
      - SIGNER_ID=4
      - PORT=8084
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=frost-dev-token
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - minikube

  signer-5:
    build:
      context: ../
      dockerfile: deploy/docker/Dockerfile.signer
    environment:
      - SIGNER_ID=5
      - PORT=8085
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=frost-dev-token
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - minikube

  grpc-proxy-1:
    build:
      context: ../
      dockerfile: deploy/docker/Dockerfile.proxy
    environment:
      - SIGNER_1_ADDR=https://signer-1:8081
      - SIGNER_2_ADDR=https://signer-2:8082
      - SIGNER_3_ADDR=https://signer-3:8083
      - SIGNER_4_ADDR=https://signer-4:8084
      - SIGNER_5_ADDR=https://signer-5:8085
      - TCP_ADDR=0.0.0.0:9090
      - KEY_ID=frost-k8s-v1
    depends_on:
      - signer-1
      - signer-2
      - signer-3
      - signer-4
      - signer-5
    networks:
      - minikube

  grpc-proxy-2:
    build:
      context: ../
      dockerfile: deploy/docker/Dockerfile.proxy
    environment:
      - SIGNER_1_ADDR=https://signer-1:8081
      - SIGNER_2_ADDR=https://signer-2:8082
      - SIGNER_3_ADDR=https://signer-3:8083
      - SIGNER_4_ADDR=https://signer-4:8084
      - SIGNER_5_ADDR=https://signer-5:8085
      - TCP_ADDR=0.0.0.0:9090
      - KEY_ID=frost-k8s-v1
    depends_on:
      - signer-1
      - signer-2
      - signer-3
      - signer-4
      - signer-5
    networks:
      - minikube

  grpc-proxy-3:
    build:
      context: ../
      dockerfile: deploy/docker/Dockerfile.proxy
    environment:
      - SIGNER_1_ADDR=https://signer-1:8081
      - SIGNER_2_ADDR=https://signer-2:8082
      - SIGNER_3_ADDR=https://signer-3:8083
      - SIGNER_4_ADDR=https://signer-4:8084
      - SIGNER_5_ADDR=https://signer-5:8085
      - TCP_ADDR=0.0.0.0:9090
      - KEY_ID=frost-k8s-v1
    depends_on:
      - signer-1
      - signer-2
      - signer-3
      - signer-4
      - signer-5
    networks:
      - minikube

  coordinator-lb:
    image: nginx:alpine
    volumes:
      - ./nginx-grpc.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9090:9090"
    depends_on:
      - grpc-proxy-1
      - grpc-proxy-2
      - grpc-proxy-3
    networks:
      - minikube

networks:
  minikube:
    external: true

volumes:
  vault-data: